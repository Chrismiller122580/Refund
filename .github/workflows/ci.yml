name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - run: npm test

      - run: npm run build
        env:
          JWT_SECRET: ci-build-secret-minimum-32-characters-long
          POSTGRES_URL: postgresql://ci:ci@localhost:5432/ci